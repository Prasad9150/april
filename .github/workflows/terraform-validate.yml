name: terraform validate
on: 
  workflow_call:

jobs: 
  terraform:
    runs-on: ubuntu-latest
    steps: 
      - name: clone the repository
        uses: actions/checkout@v4
      - name: setup terraform
        uses: hashicorp/setup-terraform@v4
      - name: terraform format
        run: terraform fmt 
      - name: terraform validate
        run: terraform validate                     